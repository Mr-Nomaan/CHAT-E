name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: Show available SDKs
      run: xcodebuild -showsdks
      
    - name: Build for generic iOS
      run: |
        xcodebuild -project CHAT-E.xcodeproj \
          -scheme CHAT-E \
          -configuration Debug \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO \
          build
          
    - name: Find built app
      run: |
        find . -name "*.app" -type d 2>/dev/null || true
        
    - name: Create IPA
      run: |
        mkdir -p output
        # Look in build directory or DerivedData
        BUILD_DIR=$(find . -name "CHAT-E.app" -type d 2>/dev/null | head -n 1)
        if [ -z "$BUILD_DIR" ]; then
          # Try alternative locations
          BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "CHAT-E.app" -type d 2>/dev/null | head -n 1)
        fi
        if [ -z "$BUILD_DIR" ]; then
          echo "ERROR: No built app found"
          exit 1
        fi
        echo "Found app at: $BUILD_DIR"
        mkdir -p output
        cd "$BUILD_DIR/.."
        zip -r "../output/CHAT-E.ipa" CHAT-E.app -r
        ls -la output/
        
    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CHAT-E.ipa
        path: output/CHAT-E.ipa