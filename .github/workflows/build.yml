name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate Xcode project
      run: xcodegen generate
      
    - name: Build for iOS Simulator
      run: |
        xcodebuild -project CHAT-E.xcodeproj \
          -scheme CHAT-E \
          -configuration Debug \
          -sdk iphonesimulator \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_ALLOWED=NO \
          build
        
    - name: Create IPA
      run: |
        mkdir -p output
        
        APP_PATH=$(find build -name "*.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          # Try DerivedData
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "CHAT-E.app" -type d | head -n 1)
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No built app found"
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        cd "$APP_PATH/.."
        zip -r "../output/CHAT-E.ipa" *.app -r
        ls -la ../output/
        
    - name: Upload IPA
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: CHAT-E.ipa
        path: output/CHAT-E.ipa