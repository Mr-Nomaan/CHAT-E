name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    - name: Show Xcode version
      run: |
        xcodebuild -version
        xcode-select -p
      
    - name: Clean old artifacts
      run: rm -rf build CHAT-E.xcodeproj DerivedData
        
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate Xcode project
      run: |
        xcodegen generate
        ls -la
        
    - name: Build with verbose output
      run: |
        xcodebuild -project CHAT-E.xcodeproj \
          -target CHAT-E \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO \
          build 2>&1
        
    - name: Show build folder
      run: |
        echo "=== Build folder structure ==="
        find ./build -type f -name "*.app" 2>/dev/null
        find ./build -type f -name "*.ipa" 2>/dev/null
        echo "=== Listing Products ==="
        ls -laR ./build/ 2>/dev/null | head -100
        
    - name: Create IPA
      run: |
        mkdir -p output
        
        # Try multiple possible locations
        APP_PATH=""
        for path in ./build/Build/Products/Debug-iphonesimulator/CHAT-E.app \
                   ./build/Build/Products/*/CHAT-E.app \
                   ./build/**/*.app; do
          if [ -e "$path" ]; then
            APP_PATH="$path"
            break
          fi
        done
        
        echo "APP_PATH: $APP_PATH"
        
        if [ -z "$APP_PATH" ] || [ ! -e "$APP_PATH" ]; then
          echo "ERROR: App not found in any expected location!"
          find ./build -name "*.app" -o -name "*CHAT-E*" 2>/dev/null
          exit 1
        fi
        
        cd "$(dirname "$APP_PATH")"
        zip -r "$OLDPWD/output/CHAT-E.ipa" "$(basename "$APP_PATH")"
        
        ls -la ./output/

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CHAT-E.ipa
        path: output/CHAT-E.ipa