name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    - name: Show version
      run: xcodebuild -version
        
    - name: Clean
      run: rm -rf build CHAT-E.xcodeproj
       
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate
      run: xcodegen generate
      
    - name: Build
      run: |
        xcodebuild -project CHAT-E.xcodeproj \
          -target CHAT-E \
          -configuration Debug \
          -sdk iphonesimulator \
          CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO \
          build 2>&1 | tee build.log
        tail -20 build.log
        
    - name: Find Built App
      run: |
        echo "=== Searching for CHAT-E.app ==="
        find ~/Library/Developer/Xcode/DerivedData -name "CHAT-E.app" -type d
        
    - name: Create IPA
      run: |
        mkdir -p output
        
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "CHAT-E.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: CHAT-E.app not found!"
          ls -la ~/Library/Developer/Xcode/DerivedData/
          exit 1
        fi
        
        echo "Found app at: $APP_PATH"
        cd "$(dirname "$APP_PATH")"
        zip -r "$OLDPWD/output/CHAT-E.ipa" "$(basename "$APP_PATH")"
        
        ls -la ./output/

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CHAT-E.ipa
        path: output/CHAT-E.ipa