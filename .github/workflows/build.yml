name: Build iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    - name: Show version
      run: xcodebuild -version
        
    - name: Clean
      run: rm -rf build CHAT-E.xcodeproj
       
    - name: Install XcodeGen
      run: brew install xcodegen
      
    - name: Generate
      run: xcodegen generate
      
    - name: Build
      run: |
        xcodebuild -project CHAT-E.xcodeproj \
          -target CHAT-E \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath ./build \
          CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO \
          build 2>&1 | tee build.log
        tail -30 build.log
        
    - name: List Build Output
      run: |
        echo "=== Build folder ==="
        ls -laR ./build/
        
    - name: Create IPA
      run: |
        mkdir -p output
        
        # Find .app in build folder
        APP_PATH=$(find ./build -name "*.app" -type d | head -1)
        
        echo "Found: $APP_PATH"
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No .app found in build folder!"
          exit 1
        fi
        
        cd "$(dirname "$APP_PATH")"
        zip -r "$OLDPWD/output/CHAT-E.ipa" "$(basename "$APP_PATH")"
        ls -la ./output/

    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: CHAT-E.ipa
        path: output/CHAT-E.ipa