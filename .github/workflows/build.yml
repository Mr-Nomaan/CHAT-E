name: Build iOS IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      
    - name: Show Xcode version
      run: xcodebuild -version
      
    - name: List available simulators
      run: xcrun simctl list devices available
      
    - name: Build for iOS Simulator
      env:
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
      run: |
        xcodebuild -project CHAT-E.xcodeproj \
          -scheme CHAT-E \
          -configuration Debug \
          -destination 'platform=iOS Simulator,OS=18.0' \
          -derivedDataPath build \
          build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
        
    - name: Find built app
      run: |
        find build -name "*.app" -type d
        APP_PATH=$(find build -name "CHAT-E.app" -type d | head -n 1)
        echo "APP_PATH=$APP_PATH"
        
    - name: Create IPA
      run: |
        mkdir -p output
        APP_PATH=$(find build -name "CHAT-E.app" -type d | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: No built app found"
          exit 1
        fi
        cd "$APP_PATH/.."
        zip -r "../output/CHAT-E.ipa" CHAT-E.app -r
        ls -la output/
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CHAT-E.ipa
        path: output/CHAT-E.ipa