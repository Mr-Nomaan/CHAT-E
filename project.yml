name: CHAT-E
options:
  bundleIdPrefix: com.multichat
  deploymentTarget:
    iOS: "12.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_ALLOWED: NO

targets:
  CHAT-E:
    type: application
    platform: iOS
    sources:
      - path: CHAT-E
        excludes:
          - "CHAT-E.entitlements"
          - "Info.plist"
    info:
      path: CHAT-E/Info.plist
    entitlements:
      path: CHAT-E/CHAT-E.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.multichat.chate
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: CHAT-E/Info.plist
        CODE_SIGN_ENTITLEMENTS: CHAT-E/CHAT-E.entitlements
        GENERATE_INFOPLIST_FILE: NO